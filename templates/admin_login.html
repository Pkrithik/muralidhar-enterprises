<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Muralidhar Enterprises</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body{
            background:#08111f;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial,sans-serif;
        }

        .login-card{
            width:400px;
            padding:40px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);
            border-radius:15px;
            border:1px solid rgba(255,255,255,0.1);
            text-align:center;
        }

        h1{
            color:#00d4ff;
            margin-bottom:10px;
        }

        p{
            color:#fff;
            opacity:.8;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#00d4ff;
            color:black;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            transform:scale(1.03);
        }

        .error{
            color:red;
            margin-bottom:15px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Muralidhar Enterprises</h1>
    <p>Admin Dashboard Login</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
