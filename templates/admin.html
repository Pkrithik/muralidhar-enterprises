<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Muralidhar Enterprises</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            color: #555;
            background: none;
            border: none;
            outline: none;
        }
        .tab.active {
            color: #00d2ff;
            border-bottom: 3px solid #00d2ff;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
        }
        button.delete-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
        }
        button.delete-btn:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Admin Dashboard</h1>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('bookings')">Vehicle Bookings</button>
        <button class="tab" onclick="switchTab('enquiries')">Contact Enquiries</button>
    </div>
    <a href="/logout" class="btn-primary">
    Logout
</a>

    <div id="bookings" class="panel active">
        <h2>Recent Bookings</h2>
        <table id="bookingsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Vehicle</th>
                    <th>Color</th>
                    <th>Message</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated via JS -->
            </tbody>
        </table>
    </div>

    <div id="enquiries" class="panel">
        <h2>Recent Enquiries</h2>
        <table id="enquiriesTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Message</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated via JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    async function fetchData() {
        // Fetch Bookings
        const bRes = await fetch('/api/admin/bookings');
        const bookings = await bRes.json();
        const bTbody = document.querySelector('#bookingsTable tbody');
        bTbody.innerHTML = '';
        bookings.forEach(b => {
            bTbody.innerHTML += `
                <tr>
                    <td>${b.id}</td>
                    <td>${b.created_at}</td>
                    <td>${b.name}</td>
                    <td>${b.phone}</td>
                    <td>${b.vehicle}</td>
                    <td>${b.color}</td>
                    <td>${b.message}</td>
                    <td><button class="delete-btn" onclick="deleteEntry('bookings', ${b.id})">Delete</button></td>
                </tr>
            `;
        });

        // Fetch Enquiries
        const eRes = await fetch('/api/admin/enquiries');
        const enquiries = await eRes.json();
        const eTbody = document.querySelector('#enquiriesTable tbody');
        eTbody.innerHTML = '';
        enquiries.forEach(e => {
            eTbody.innerHTML += `
                <tr>
                    <td>${e.id}</td>
                    <td>${e.created_at}</td>
                    <td>${e.name}</td>
                    <td>${e.phone}</td>
                    <td>${e.email}</td>
                    <td>${e.message}</td>
                    <td><button class="delete-btn" onclick="deleteEntry('enquiries', ${e.id})">Delete</button></td>
                </tr>
            `;
        });
    }

    async function deleteEntry(type, id) {
        if(confirm('Are you sure you want to delete this entry?')) {
            const res = await fetch(`/api/admin/${type}/${id}`, { method: 'DELETE' });
            if(res.ok) {
                fetchData();
            } else {
                alert('Error deleting entry.');
            }
        }
    }

    // Initial fetch
    fetchData();
</script>

</body>
</html>
